version: '3.8'

services:
  # Elasticsearch: Bizim axtarış motorumuz
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: pdf-search-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Öyrənmə mərhələsində asan olsun deyə şifrəni bağlayırıq
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # RAM-ı limitləyirik
    ports:
      - "9200:9200"
    networks:
      - elastic-net

  # Kibana: Elasticsearch-ə vizual baxmaq üçün panel
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: pdf-search-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elastic-net

networks:
  elastic-net:
    driver: bridge